<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Sebastián Castillo</title>

<link rel="preload" href="images/Authentic%20Declaration.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="images/BarlowSemiCondensed-Black.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="images/BarlowSemiCondensed-Bold.ttf"  as="font" type="font/ttf" crossorigin>

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Background slideshow ── -->
<div id="bgContainer">
  <div class="bg-slide active">
    <div class="bg-img" style="background-image:url('https://i.postimg.cc/7YpH0r4j/DSC00511.jpg')"></div>
  </div>
  <div class="bg-slide">
    <div class="bg-img" style="background-image:url('https://i.postimg.cc/cHX1nK4s/DSC00469.jpg')"></div>
  </div>
  <div class="bg-slide">
    <div class="bg-img" style="background-image:url('https://i.postimg.cc/4xg3jR05/DSC00671.jpg')"></div>
  </div>
  <div class="bg-slide">
    <div class="bg-img" style="background-image:url('https://i.postimg.cc/qRzB2Jtf/DSC00684.jpg')"></div>
  </div>
  <div class="bg-slide">
    <div class="bg-img" style="background-image:url('https://i.postimg.cc/NG2fM0vv/IMG-20251202-132749.jpg')"></div>
  </div>
  <div class="bg-slide">
    <div class="bg-img" style="background-image:url('https://i.postimg.cc/0QWxNLZH/DSC00548.jpg')"></div>
  </div>
  <div class="bg-slide">
    <div class="bg-img" style="background-image:url('https://i.postimg.cc/DzGbLPRc/DSC00242-(3).jpg')"></div>
  </div>
</div>

<!-- subtle scroll hint -->
<div id="scrollHint" aria-hidden="true">
  <span>scroll</span>
  <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
    <path d="M7 1v11M2 8l5 5 5-5"
          stroke="rgba(255,255,255,0.30)"
          stroke-width="1.4"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </svg>
</div>

<!-- page content — gives the page scrollable height -->
<div id="pageContent">
  <!-- First screen spacer (glass card floats here fixed) -->
  <div class="hero-spacer" aria-hidden="true"></div>

  <!-- Contact section — appears on scroll -->
  <section id="contactSection" aria-label="Sección de contacto">
    
    <div class="contact-wrapper">
      <h3 class="contact-prompt">Contacto</h3>
      <div class="contact-pill" id="contactTrigger"
           role="button" tabindex="0"
           aria-label="Abrir formulario de contacto">
        <span class="contact-pill-label">hablemos</span>
      </div>
    </div>
    
  </section>
</div>

<!-- ── Glass card ── -->
<div class="glassModule" id="glassModule" style="left:calc(50vw - 170px);top:calc(50vh - 210px);">
  <div class="module-content" aria-labelledby="moduleTitle">

    <div class="module-hint">sí, arrástrame</div>
    <button class="module-back" id="backBtn" aria-label="Volver">← atrás</button>

    <div id="defaultView" style="display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;">
      <h3 style="font-size:70px;" class="module-title" id="moduleTitle">Sebastián Castillo</h3>
      <p class="module-desc">acá vas a ver ir directo mis redes, ver portafolios y proyectos visuales</p>
      <button class="module-btn" id="actionBtn" aria-label="Ver links">Muestre pues</button>
    </div>

    <div id="btnPanel">
      <a href="https://instagram.com/zescru"                               target="_blank" class="module-btn">Instagram</a>
      <a href="https://youtu.be/KYLLRByK2sg?si=h8MAiF-jrZ2dwfjg"         target="_blank" class="module-btn">Escuela nocturna</a>
      <a href="https://facebook.com/demofobico"                            target="_blank" class="module-btn">coming soon O:</a>
    </div>

  </div>
</div>

<!-- contact modal -->
<div class="cmodal-wrap" id="contactModal" role="dialog" aria-modal="true" aria-label="Formulario de contacto">
  <div class="cmodal-overlay" id="cmodalOverlay"></div>
  <div class="cmodal-panel">
    <button class="cmodal-close" id="cmodalClose" aria-label="Cerrar">✕ cerrar</button>
    <div class="cmodal-body">
      <h3 style="font-size: 50px" class="cmodal-title" id="cmodalTitle">Hablemos</h3>
      <form class="cmodal-form" id="cmodalForm" novalidate>
        <input  class="cmodal-input" type="text"  name="nombre"  placeholder="tu nombre"    autocomplete="name"  required/>
        <input  class="cmodal-input" type="email" name="email"   placeholder="tu email"     autocomplete="email" required/>
        <textarea class="cmodal-input"             name="mensaje" placeholder="tu mensaje"                        required></textarea>
        <button type="submit" class="module-btn" style="width:100%;min-width:unset;margin-top:2px;">Enviar</button>
      </form>
      <div class="cmodal-success" id="cmodalSuccess">
        <p>¡Gracias!<br>Te contactaré<br>muy pronto 🤝</p>
      </div>
    </div>
  </div>
</div>

<!-- SVG distortion filter -->
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute;overflow:hidden">
  <defs>
    <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="1" seed="9000" result="noise"/>
      <feGaussianBlur in="noise" stdDeviation="2" result="blurred"/>
      <feDisplacementMap in="SourceGraphic" in2="blurred" scale="77" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<script src="script.js"></script>
</body>
</html>
